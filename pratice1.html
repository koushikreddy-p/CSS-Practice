<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
  *{
    background-color:#0A3156;
  }
  #one, #two {
    width: 100px;
    height: 100px;
    background: #C0FFAD;
    border-radius: 50%;
    margin-left: 100px;
    margin-top: 40px;
  }
  #two {
    transform: translateX(200px);
  }
  #one
{
    transform: translateY(140px);
}

#base1, #base2 {
    width: 100px;
    height: 40px;
    background: #C0FFAD;
    margin-left: 100px;
    margin-top: 40px;
}

#base1 {
    transform: translateY(-50px);
}
#base2 {
    transform: translateY(-130px) translateX(200px);
}

#top{
    width: 300px;
    height: 40px;
    background: #C0FFAD;
    margin-left: 100px;
    margin-top: 40px;
    transform: translateY(-335px);
}


  
  
</style>
</head>
<body>
    <div id="one"></div>
    <div id="two"></div>
    <div id="base1"></div>
    <div id="base2"></div>
    <div id="top"></div>
    
</body>
</html>
