<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        background-color: black;
        padding: 10px;
        width: 700px;
        height: 450px;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        grid-template-rows: 1fr 1fr 1fr 1fr;
        gap: 10px;
        grid-template-areas:
          "box1 box2 box3 box4"
          "box1 box5 box5 box4"
          "box6 box5 box5 box7"
          "box6 box8 box9 box9";
      }
      .item {
        border-radius: 10px;
      }
      .box1 {
        background-color: #f5d6ee;
        grid-area: box1;
      }
      .box2 {
        background-color: #4a9172;
        grid-area: box2;
        padding: 10px;
      }
      .box3 {
        background-color: #6b6c6d;
        grid-area: box3;
        padding: 10px;
      }
      .box4 {
        background-color: #c9cfd4;
        grid-area: box4;
        padding: 10px;
      }
      .box5 {
        background-color: #aea3fa;
        grid-area: box5;
        padding: 10px;
      }
      .box6 {
        background-color: #eae5ff;
        grid-area: box6;
        padding: 10px;
      }
      .box7 {
        background-color: #f5d6ee;
        grid-area: box7;
        padding: 10px;
      }
      .box8 {
        background-color: #f8fe9e;
        grid-area: box8;
        padding: 10px;
      }
      .box9 {
        background-color: #4a9172;
        grid-area: box9;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item box1"></div>
      <div class="item box2"></div>
      <div class="item box3"></div>
      <div class="item box4"></div>
      <div class="item box5"></div>
      <div class="item box6"></div>
      <div class="item box7"></div>
      <div class="item box8"></div>
      <div class="item box9"></div>
    </div>
  </body>
</html>
