<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            background-color: white;
            margin: 50px;
        }
        #red {
            width: 300px;
            height: 300px;
            background-color: #EC1D25;
        }
        #white {
            width: 200px;
            height: 200px;
            background-color: white;
            transform: translateX(50px) translateY(-300px);
        }
        #vertical {
            width: 50px;
            height: 300px;
            background-color: white;
            transform: translateY(-600px) translateX(125px);
        }
        #horizontal {
            width: 300px;
            height: 50px;
            background-color: white;
            transform: translateY(-820px);
        }

        #blue {
            width: 100px;
            height: 100px;
            background-color: #004B8E;
            transform: translateY(-950px) translateX(100px);
        }
    </style>
</head>
<body>
    <div id="red"></div>
    <div id="white"></div>
    <div id="vertical"></div>
    <div id="horizontal"></div>
    <div id="blue"></div>
    
</body>
</html>
