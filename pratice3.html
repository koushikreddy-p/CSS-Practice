<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            background-color: #9BE9FD;
            align-items: center;
            align-content: center;
        }

        #one{
            width: 250px;
            height: 250px;
            background-color: #222222;
            border-radius: 50%;
            margin-left: 100px;
            margin-top: 40px;
            transform: translateY(140px);
        }

        #square {
            width: 160px;
            height: 250px;
            background-color: #9BE9FD;
            transform: translateY(-40px) translateX(147px);

        }

        #eye-one {
            width: 30px;
            height: 30px;
            background-color: #222222;
            transform: translateY(-250px) translateX(175px);
        }

        #eye-two {
            width: 30px;
            height: 30px;
            background-color: #222222;
            transform: translateY(-280px) translateX(250px);
        }

        #mouth {
            width: 100px;
            height: 20px;
            background-color: #222222;
            transform: translateY(-240px) translateX(180px);
        }

        #chin {
            width: 155px;
            height: 20px;
            background-color: #222222;
            transform: translateY(-210px) translateX(150px);
        }
    </style>
</head>
<body>
    <div id="one"></div>
    <div id="square"></div>
    <div id="eye-one"></div>
    <div id="eye-two"></div>
    <div id="mouth"></div>
    <div id="chin"></div>
    
</body>
</html>
