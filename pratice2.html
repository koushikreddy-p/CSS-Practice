<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            background-color: #C9A077;
            margin: 50px;
        }

        #big-circle{
            width: 300px;
            height: 300px;
            background-color: #273E7C;
            border-radius: 50%;
        }

        #small-circle{
            width: 250px;
            height: 250px;
            background-color: #C9A077;
            border-radius: 50%;
            margin-left: 200px;
            margin-top: -150px;
            transform: translateX(-123px) translateY(-175px);
        }
        #cross {
            width: 50px;
            height: 50px;
            background-color: #C9A077;
            transform: translateY(-250px) translateX(125px);
        }
        #stright {
            width: 300px;
            height: 25px;
            background-color: #C9A077;
            transform: translateY(-450px);
        }

    </style>
</head>
<body>
    <div id="big-circle"></div>
    <div id="small-circle"></div>
    <div id="cross"></div>
    <div id="stright"></div>
</body>
</html>
