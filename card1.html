<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 300px;
            height: 500px;
            border: 2px solid black;
            border-radius: 10px;
            margin: 20px 30px;
            padding-left: 30px;
            padding-bottom: 20px;
            background-color: #f5f9ff;
        }
        img{
            margin-top: 20px;
            margin-left: 30px;
        }
        h2 {
            margin-top: 25px;
            font-family: sans-serif;
            font-size: 25px;
        }
        p{
            font-family: sans-serif;
            font-size: 20px;
            margin-right: 25px;
        }
        #btn {
            background-color: #166af6;
            color: white;
            border-radius: 10px;
            height: 40px;
            width: 110px;
            font-family: sans-serif;
            font-size: 16px;
            font-weight: bold;
            padding: 5px 10px;
            border: none;
        }
    </style>
</head>
<body>
    <div>
        <img src="./images/headphone1.png" alt="Headphone image" width="220px" height="220px" >
        <h2>Wireless Headphones</h2>
        <p>Experience premium sound quality with these comfortable wireless headphones. Perfect for music,calls, and everyday use.</p>
        <button id="btn">Buy Now</button>
    </div>
</body>
</html>
